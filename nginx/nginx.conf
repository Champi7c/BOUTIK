# Redirection www → sans www
server {
    listen 80;
    server_name www.thiamstreetwear.com;
    return 301 http://thiamstreetwear.com$request_uri;
}

server {
    listen 80;
    server_name thiamstreetwear.com;
    client_max_body_size 20M;

    # Fichiers statiques servis directement par Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers media (images produits, etc.)
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Tout le reste → Django via Gunicorn
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
