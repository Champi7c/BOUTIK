{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Bright Looks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a1a; font-family: Inter, sans-serif; }
    .admin-login { width: 100%; max-width: 420px; padding: 2rem; }
    .admin-login-card { background: #fff; padding: 2.5rem; border: 1px solid #eee; }
    .admin-login-brand { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em; text-align: center; color: #6A5294; margin-bottom: 0.25rem; }
    .admin-login-sub { text-align: center; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 2rem; }
    .admin-login-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #333; margin-bottom: 1.5rem; text-align: center; }
    .admin-field { margin-bottom: 1rem; }
    .admin-field label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 0.35rem; }
    .admin-field input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; font-size: 0.9rem; box-sizing: border-box; }
    .admin-field input:focus { outline: none; border-color: #6A5294; }
    .admin-submit { width: 100%; padding: 0.85rem; background: #6A5294; color: #fff; border: none; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; }
    .admin-submit:hover { background: #5a4480; }
    .admin-footer { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; }
    .admin-footer a { color: #aaa; text-decoration: none; }
    .admin-footer a:hover { color: #fff; }
    .dash-alert { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="admin-login">
    <div class="admin-login-card">
      <div class="admin-login-brand">Bright Looks</div>
      <div class="admin-login-sub">Panneau gérant — accès réservé</div>
      <div class="admin-login-title"><i class="fas fa-lock"></i> Connexion administrateur</div>

      {% if messages %}
      {% for message in messages %}
      <div class="dash-alert {% if message.tags == 'error' %}error{% else %}success{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="admin-field">
          <label for="username">Identifiant ou email</label>
          <input type="text" id="username" name="username" required autofocus placeholder="admin">
        </div>
        <div class="admin-field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="admin-submit"><i class="fas fa-sign-in-alt"></i> Accéder au dashboard</button>
      </form>
    </div>
    <div class="admin-footer">
      <a href="/"><i class="fas fa-arrow-left"></i> Retour au site client</a>
      &nbsp;·&nbsp;
      <a href="{% url 'accounts:login' %}">Connexion client</a>
    </div>
  </div>
</body>
</html>
